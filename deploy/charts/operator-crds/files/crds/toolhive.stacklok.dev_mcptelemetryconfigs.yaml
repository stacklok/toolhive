                  rule: '!has(self.headers) || !has(self.sensitiveHeaders) || self.sensitiveHeaders.all(sh,
                    !(sh.name in self.headers))'
              prometheus:
                description: Prometheus defines Prometheus-specific configuration
                properties:
                  enabled:
                    default: false
                    description: Enabled controls whether Prometheus metrics endpoint
                      is exposed
                    type: boolean
                type: object
            type: object
          status:
            description: MCPTelemetryConfigStatus defines the observed state of MCPTelemetryConfig
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the MCPTelemetryConfig's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              configHash:
                description: ConfigHash is a hash of the current configuration for
                  change detection
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  for this MCPTelemetryConfig.
                format: int64
                type: integer
              referencingWorkloads:
                description: ReferencingWorkloads lists workloads that reference this
                  MCPTelemetryConfig
                items:
                  description: |-
                    WorkloadReference identifies a workload that references a shared configuration resource.
                    Namespace is implicit — cross-namespace references are not supported.
                  properties:
                    kind:
                      description: Kind is the type of workload resource
                      enum:
                      - MCPServer
                      - VirtualMCPServer
                      - MCPRemoteProxy
                      type: string
                    name:
                      description: Name is the name of the workload resource
                      minLength: 1
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
