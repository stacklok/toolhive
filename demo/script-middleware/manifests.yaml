---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: pagerduty
  namespace: script-demo
spec:
  image: ghcr.io/stackloklabs/dummy-mcp:0.1.3
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 8100
  groupRef: demo-group
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          env:
            - name: TOOLS_CONFIG
              value: '{"tools":[{"name":"pagerduty_list_services","description":"List monitored services and their status","return_value":"api-gateway — Operational ✓\nauth-service — Operational ✓\nweb-app — Degraded Performance ⚠\ndatabase-primary — Operational ✓\ncheckout-service — Degraded Performance ⚠\ncache-redis — Operational ✓"},{"name":"pagerduty_list_incidents","description":"List active incidents by service and severity","input_schema":{"service":{"type":"string","description":"Service name to filter"},"status":{"type":"string","description":"Incident status (triggered, acknowledged, resolved)"}},"return_value":"INC-4521 [triggered] web-app: Elevated p99 latency (>2s) — SEV2 — 23 min ago\nINC-4522 [triggered] checkout-service: Timeout errors on payment flow — SEV1 — 18 min ago\nINC-4519 [acknowledged] web-app: Increased error rate on /checkout — SEV2 — 45 min ago\nINC-4515 [resolved] api-gateway: Certificate expiry warning — SEV3 — 2h ago"},{"name":"pagerduty_ack_incident","description":"Acknowledge or resolve an incident","input_schema":{"incident_id":{"type":"string","description":"Incident ID (e.g. INC-4521)"},"action":{"type":"string","description":"Action: acknowledge or resolve"}},"return_value":"Acknowledged INC-4521 — assigned to current oncall (alice@company.com)"}]}'
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: datadog
  namespace: script-demo
spec:
  image: ghcr.io/stackloklabs/dummy-mcp:0.1.3
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 8100
  groupRef: demo-group
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          env:
            - name: TOOLS_CONFIG
              value: '{"tools":[{"name":"datadog_list_dashboards","description":"List monitoring dashboards","return_value":"API Gateway Overview — Last viewed 2h ago\nService Health Matrix — Last viewed 30m ago\nDatabase Performance — Last viewed 1h ago\nDeployment Tracker — Last viewed 4h ago"},{"name":"datadog_query_metrics","description":"Query metrics, traces, and service health","input_schema":{"query":{"type":"string","description":"Metric query (e.g. avg:system.cpu.user)"},"timeframe":{"type":"string","description":"Time range (e.g. last_1h, last_24h)"}},"return_value":"avg:http.request.duration{service:web-app} [last_1h]\n  p50: 145ms | p95: 1230ms | p99: 2890ms ⚠ (SLO breach)\n  Request rate: 8,421 req/min (↓ 15% from baseline)\n  Error rate: 4.7% ⚠ (baseline: 0.3%)\n  Top error: 504 Gateway Timeout on /checkout — 312 occurrences"},{"name":"datadog_search_logs","description":"Search application logs by service or keyword","input_schema":{"query":{"type":"string","description":"Log search query"},"service":{"type":"string","description":"Service name filter"}},"return_value":"[11:18:42] ERROR web-app: Timeout connecting to checkout-service timeout=5s path=/checkout\n[11:18:38] ERROR checkout-service: upstream dependency timeout service=payment-gateway\n[11:17:55] WARN web-app: Retry exhausted for /checkout attempts=3 last_error=504\n[11:15:02] INFO web-app: Deployment v2.4.1 rollout complete replicas=5/5\n[11:02:33] INFO web-app: Starting deployment v2.4.1 initiated_by=alice"}]}'
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
