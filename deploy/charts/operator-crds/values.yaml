# -- CRD installation configuration
crds:
  # -- Whether to install CRDs as part of the Helm release
  install: true
  # -- Whether to add the "helm.sh/resource-policy: keep" annotation to CRDs
  # When true, CRDs will not be deleted when the Helm release is uninstalled
  keep: true
  # -- Whether to install Server CRDs (mcpservers, mcpexternalauthconfigs, mcpremoteproxies, mcptoolconfigs, mcpgroups)
  enableServer: true
  # -- Whether to install Registry CRDs (mcpregistries)
  enableRegistry: true
  # -- Whether to install VirtualMCP CRDs (virtualmcpservers, virtualmcpcompositetooldefinitions)
  enableVirtualMcp: true