name: Linting

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-go-code:
    name: Lint Go Code
    runs-on: ubuntu-8cores-32gb
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 'stable'
          cache: true  # Caches go modules
          cache-dependency-path: go.sum

      # Download all dependencies upfront (will be cached)
      - name: Download Go dependencies
        run: |
          go mod download
          go mod verify

      # Cache Go build cache for faster compilation during linting
      - name: Cache Go build cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-lint-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-lint-
            ${{ runner.os }}-go-build-

      - name: Check go.mod version format
        run: |
          found=$(grep -rP '^go \d+\.\d+\.\d+' --include='go.mod' .)
          if [ -n "$found" ]; then
            echo "ERROR: patch version found in go directive (use 'go 1.X' not 'go 1.X.Y'):"
            echo "$found"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          # Enable golangci-lint's built-in caching (removes skip-cache: true)
          args: --timeout=5m
