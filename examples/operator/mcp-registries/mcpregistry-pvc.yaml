# Example MCPRegistry using a single PVC with multiple registries
#
# This example demonstrates:
# 1. Creating a single PVC to store multiple registry sources
# 2. Configuring MCPRegistry with multiple registries from the same PVC
# 3. Each registry in its own subdirectory within the PVC
# 4. Independent sync policies and filters per registry
#
# PVC structure:
#   /production/registry.json    - Production servers
#   /development/registry.json   - Development servers
#
# The PVC can be populated by:
# - An init container or Job (example below)
# - A separate process that writes to the PVC
# - Manual copy using kubectl cp
# - A CSI driver that provides the data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-registry-data
  namespace: toolhive-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Mi
---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPRegistry
metadata:
  name: pvc-multi-registry
  namespace: toolhive-system
spec:
  displayName: "Multi-Registry from Single PVC"
  registries:
    # Production registry - stored in /production subdirectory
    - name: production
      format: toolhive
      pvcRef:
        claimName: shared-registry-data
        path: production/registry.json
      syncPolicy:
        interval: "2h"
      filter:
        tags:
          include:
            - "production"
            - "stable"

    # Development registry - stored in /development subdirectory
    - name: development
      format: toolhive
      pvcRef:
        claimName: shared-registry-data
        path: development/registry.json
      syncPolicy:
        interval: "30m"
      filter:
        tags:
          include:
            - "development"
            - "testing"
---
# Example Job to populate the shared PVC with multiple registry directories
# This job creates the directory structure and writes registry data for both registries
apiVersion: batch/v1
kind: Job
metadata:
  name: populate-shared-registry-pvc
  namespace: toolhive-system
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: populate
        image: busybox:latest
        command:
        - /bin/sh
        - -c
        - |
          # Create subdirectories for each registry
          mkdir -p /data/production
          mkdir -p /data/development

          # Write production registry data
          cat > /data/production/registry.json <<'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/stacklok/toolhive/main/pkg/registry/data/schema.json",
            "version": "1.0.0",
            "last_updated": "2025-11-26T12:00:00Z",
            "servers": {
              "prod-filesystem": {
                "description": "Production-ready filesystem operations server",
                "tier": "Official",
                "status": "Active",
                "transport": "stdio",
                "tools": [
                  "read_file",
                  "write_file",
                  "list_directory",
                  "create_directory",
                  "backup_files"
                ],
                "metadata": {
                  "stars": 1500,
                  "pulls": 500,
                  "last_updated": "2025-11-26T12:00:00Z"
                },
                "repository_url": "https://github.com/modelcontextprotocol/servers",
                "tags": [
                  "filesystem",
                  "files",
                  "storage",
                  "production",
                  "stable"
                ],
                "image": "docker.io/mcp/filesystem:latest",
                "permissions": {
                  "network": {
                    "outbound": {}
                  }
                },
                "args": [
                  "/projects"
                ]
              },
              "github-api": {
                "description": "Production GitHub API integration",
                "tier": "Official",
                "status": "Active",
                "transport": "stdio",
                "tools": [
                  "create_issue",
                  "create_pull_request",
                  "search_repositories"
                ],
                "metadata": {
                  "stars": 2200,
                  "pulls": 800,
                  "last_updated": "2025-11-26T12:00:00Z"
                },
                "repository_url": "https://github.com/github/github-mcp-server",
                "tags": [
                  "github",
                  "api",
                  "repository",
                  "production",
                  "stable"
                ],
                "image": "ghcr.io/github/github-mcp-server:latest",
                "permissions": {
                  "network": {
                    "outbound": {
                      "allow_host": [
                        ".github.com",
                        ".githubusercontent.com"
                      ],
                      "allow_port": [
                        443
                      ]
                    }
                  }
                },
                "env_vars": [
                  {
                    "name": "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "description": "GitHub personal access token with appropriate permissions",
                    "required": true,
                    "secret": true
                  }
                ]
              }
            }
          }
          EOF

          # Write development registry data
          cat > /data/development/registry.json <<'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/stacklok/toolhive/main/pkg/registry/data/schema.json",
            "version": "1.0.0",
            "last_updated": "2025-11-26T12:00:00Z",
            "servers": {
              "dev-filesystem": {
                "description": "Development version of filesystem operations server",
                "tier": "Community",
                "status": "Active",
                "transport": "stdio",
                "tools": [
                  "read_file",
                  "write_file",
                  "list_directory"
                ],
                "metadata": {
                  "stars": 800,
                  "pulls": 200,
                  "last_updated": "2025-11-26T12:00:00Z"
                },
                "repository_url": "https://github.com/modelcontextprotocol/servers",
                "tags": [
                  "filesystem",
                  "files",
                  "development",
                  "testing"
                ],
                "image": "docker.io/mcp/filesystem:dev",
                "permissions": {
                  "network": {
                    "outbound": {}
                  }
                }
              },
              "test-runner": {
                "description": "Automated testing and quality assurance server",
                "tier": "Community",
                "status": "Active",
                "transport": "stdio",
                "tools": [
                  "run_tests",
                  "analyze_coverage",
                  "generate_report"
                ],
                "metadata": {
                  "stars": 300,
                  "pulls": 80,
                  "last_updated": "2025-11-26T12:00:00Z"
                },
                "repository_url": "https://github.com/testing/test-runner-mcp",
                "tags": [
                  "testing",
                  "quality",
                  "automation",
                  "development"
                ],
                "image": "testing/test-runner:latest",
                "permissions": {
                  "network": {
                    "outbound": {}
                  }
                }
              }
            }
          }
          EOF

          echo "Registry data written successfully"
          echo "Production registry:"
          ls -lh /data/production/registry.json
          echo "Development registry:"
          ls -lh /data/development/registry.json
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: shared-registry-data
