                                properties:
                                  key:
                                    description: Key is the key within the secret
                                    type: string
                                  name:
                                    description: Name is the name of the secret
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              insecureSkipVerify:
                                description: |-
