# Conformance baseline for the ToolHive vMCP aggregator (`thv vmcp serve`).
#
# vMCP terminates the MCP protocol and re-serves an aggregated view of its
# backends. This PR makes it conformant — completions, resource templates,
# resource subscribe/unsubscribe (ack-level), and mid-call forwarding of
# elicitation/sampling/progress/logging (and embedded-resource decode via
# toolhive-core v0.0.32) — so the previously-failing scenarios are expected to
# PASS now, and this list is empty.
#
# List a scenario name here only if it is KNOWN to fail and accepted. The suite
# fails CI on any failure NOT listed here; an entry that starts passing again is
# reported as STALE and also fails CI, so keep this accurate. If the CI vMCP leg
# surfaces a genuinely-unfixed scenario (e.g. resource subscribe requiring an
# actual notifications/resources/updated rather than just the ack), add it here
# with a comment pointing to the follow-up.
server: []
