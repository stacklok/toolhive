# -- CRD installation configuration
crds:
  # -- Whether to install CRDs as part of the Helm release
  install: true
  # -- Whether to add the "helm.sh/resource-policy: keep" annotation to CRDs
  # When true, CRDs will not be deleted when the Helm release is uninstalled
  keep: true
  # -- List of CRD names to skip during installation (useful for upgrades)
  # Example: ["mcpservers.toolhive.stacklok.dev"]
  skip:
  - virtualmcpcompositetooldefinitions.toolhive.stacklok.dev
  - mcpremoteproxies.toolhive.stacklok.dev
