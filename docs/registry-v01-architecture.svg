<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/></marker>
  </defs>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">Registry v0.1 — Architecture</text>
  <text x="550" y="55" text-anchor="middle" font-size="14" fill="#757575">Data flow from sources through providers to API consumers</text>

  <!-- Zone 1: Sources -->
  <rect x="20" y="75" width="175" height="420" rx="12" fill="#dbe4ff" fill-opacity="0.35" stroke="#4a9eed" stroke-width="1"/>
  <text x="65" y="100" font-size="15" font-weight="bold" fill="#2563eb">Sources</text>

  <rect x="35" y="115" width="145" height="42" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="107" y="141" text-anchor="middle" font-size="14" fill="#1e1e1e">Embedded</text>

  <rect x="35" y="175" width="145" height="42" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="107" y="201" text-anchor="middle" font-size="14" fill="#1e1e1e">File / URL</text>

  <rect x="35" y="235" width="145" height="42" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="107" y="261" text-anchor="middle" font-size="14" fill="#1e1e1e">API Endpoint</text>

  <rect x="35" y="295" width="145" height="42" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="107" y="321" text-anchor="middle" font-size="14" fill="#1e1e1e">Registry Server</text>

  <text x="107" y="365" text-anchor="middle" font-size="12" fill="#2563eb">All upstream MCP</text>
  <text x="107" y="380" text-anchor="middle" font-size="12" fill="#2563eb">format only</text>
  <text x="107" y="400" text-anchor="middle" font-size="12" fill="#ef4444">(legacy removed)</text>

  <!-- Arrows: Sources -> Parse -->
  <line x1="180" y1="136" x2="225" y2="165" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="180" y1="196" x2="225" y2="180" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="180" y1="256" x2="225" y2="200" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="180" y1="316" x2="225" y2="215" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Zone 2: Parse + Retain -->
  <rect x="220" y="75" width="210" height="420" rx="12" fill="#e5dbff" fill-opacity="0.35" stroke="#8b5cf6" stroke-width="1"/>
  <text x="255" y="100" font-size="15" font-weight="bold" fill="#6d28d9">Parse + Retain</text>

  <rect x="235" y="120" width="180" height="50" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="325" y="141" text-anchor="middle" font-size="13" fill="#1e1e1e">parseUpstream</text>
  <text x="325" y="157" text-anchor="middle" font-size="13" fill="#1e1e1e">Registry()</text>

  <!-- Arrow down from parser -->
  <line x1="325" y1="170" x2="325" y2="195" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="325" y="190" text-anchor="middle" font-size="11" fill="#6d28d9">retains both</text>

  <!-- Three stored representations -->
  <rect x="235" y="200" width="180" height="38" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="325" y="224" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">ServerJSON []</text>

  <rect x="235" y="250" width="180" height="38" rx="8" fill="#c3fae8" stroke="#22c55e" stroke-width="1.5"/>
  <text x="325" y="274" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">ToolHive types</text>

  <rect x="235" y="300" width="180" height="38" rx="8" fill="#eebefa" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="325" y="324" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d28d9">Skills []</text>

  <text x="325" y="365" text-anchor="middle" font-size="12" fill="#6d28d9">Provider stores all three.</text>
  <text x="325" y="382" text-anchor="middle" font-size="12" fill="#6d28d9">Each consumer picks</text>
  <text x="325" y="399" text-anchor="middle" font-size="12" fill="#6d28d9">the format it needs.</text>

  <!-- Zone 3: Manager -->
  <rect x="465" y="75" width="165" height="420" rx="12" fill="#d3f9d8" fill-opacity="0.35" stroke="#22c55e" stroke-width="1"/>
  <text x="500" y="100" font-size="15" font-weight="bold" fill="#15803d">Manager</text>

  <rect x="480" y="120" width="135" height="50" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5"/>
  <text x="547" y="141" text-anchor="middle" font-size="13" fill="#1e1e1e">Registry</text>
  <text x="547" y="157" text-anchor="middle" font-size="13" fill="#1e1e1e">Manager</text>

  <!-- Diamond: route by name -->
  <polygon points="547,200 610,235 547,270 484,235" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="547" y="239" text-anchor="middle" font-size="13" fill="#1e1e1e">by name</text>

  <rect x="480" y="290" width="135" height="42" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5"/>
  <text x="547" y="316" text-anchor="middle" font-size="14" fill="#1e1e1e">Provider(s)</text>

  <!-- Manager internal arrows -->
  <line x1="547" y1="170" x2="547" y2="200" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="547" y1="270" x2="547" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Arrow from Parse zone to Manager -->
  <line x1="415" y1="219" x2="480" y2="155" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <text x="547" y="360" text-anchor="middle" font-size="12" fill="#15803d">Today: "default" only</text>
  <text x="547" y="377" text-anchor="middle" font-size="12" fill="#15803d">Future: "embedded",</text>
  <text x="547" y="394" text-anchor="middle" font-size="12" fill="#15803d">"cloud", "local", ...</text>

  <!-- Zone 4: API Surface -->
  <rect x="665" y="75" width="280" height="420" rx="12" fill="#ffc9c9" fill-opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="750" y="100" font-size="15" font-weight="bold" fill="#dc2626">API Surface</text>

  <!-- v0.1 endpoints (NEW) -->
  <rect x="685" y="118" width="240" height="55" rx="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="805" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">/registry/{name}/v0.1</text>
  <text x="805" y="158" text-anchor="middle" font-size="12" fill="#92400e">servers + skills endpoints</text>

  <rect x="935" y="125" width="50" height="24" rx="4" fill="#f59e0b" stroke="none"/>
  <text x="960" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="white">NEW</text>

  <!-- Old API -->
  <rect x="685" y="195" width="240" height="55" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5"/>
  <text x="805" y="217" text-anchor="middle" font-size="13" fill="#991b1b">/api/v1beta/registry</text>
  <text x="805" y="235" text-anchor="middle" font-size="12" fill="#991b1b">config mgmt + auth only</text>

  <!-- CLI -->
  <rect x="685" y="272" width="240" height="55" rx="8" fill="#c3fae8" stroke="#22c55e" stroke-width="1.5"/>
  <text x="805" y="294" text-anchor="middle" font-size="13" fill="#15803d">CLI: thv registry</text>
  <text x="805" y="312" text-anchor="middle" font-size="12" fill="#15803d">--registry flag + list-registries</text>

  <!-- Arrows from Manager to API surface -->
  <line x1="615" y1="305" x2="685" y2="145" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="637" y="210" font-size="11" fill="#f59e0b" transform="rotate(-40,637,210)">ServerJSON</text>

  <line x1="615" y1="311" x2="685" y2="222" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="638" y="270" font-size="11" fill="#ef4444" transform="rotate(-20,638,270)">TH types</text>

  <line x1="615" y1="318" x2="685" y2="299" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="643" y="318" font-size="11" fill="#22c55e">TH types</text>

  <!-- Key insight box -->
  <rect x="685" y="350" width="240" height="80" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="805" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Key Insight</text>
  <text x="805" y="392" text-anchor="middle" font-size="12" fill="#1e1e1e">Parse once, store both formats.</text>
  <text x="805" y="409" text-anchor="middle" font-size="12" fill="#1e1e1e">Each consumer picks what it needs.</text>
  <text x="805" y="426" text-anchor="middle" font-size="12" fill="#1e1e1e">No lossy round-trip conversions.</text>

  <!-- Bottom legend -->
  <rect x="20" y="460" width="12" height="12" rx="2" fill="#fff3bf" stroke="#f59e0b"/>
  <text x="38" y="471" font-size="11" fill="#555">ServerJSON (upstream v0.1 wire format)</text>
  <rect x="270" y="460" width="12" height="12" rx="2" fill="#c3fae8" stroke="#22c55e"/>
  <text x="288" y="471" font-size="11" fill="#555">ToolHive types (ImageMetadata, RemoteServerMetadata)</text>
  <rect x="590" y="460" width="12" height="12" rx="2" fill="#eebefa" stroke="#8b5cf6"/>
  <text x="608" y="471" font-size="11" fill="#555">Skills (shared type)</text>
</svg>