---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "operator.fullname" . }}-manager-role
  labels:
    {{- include "operator.labels" . | nindent 4 }}
    {{- include "toolhive.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - secrets
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/attach
  verbs:
  - create
  - get
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gateways
  - httproutes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  - roles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - toolhive.stacklok.dev
  resources:
  - embeddingservers
  - mcpexternalauthconfigs
  - mcpgroups
  - mcpoidcconfigs
  - mcpregistries
  - mcpremoteproxies
  - mcpservers
  - mcptoolconfigs
  - virtualmcpservers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - toolhive.stacklok.dev
  resources:
  - embeddingservers/finalizers
  - mcpexternalauthconfigs/finalizers
  - mcpgroups/finalizers
  - mcpoidcconfigs/finalizers
  - mcpregistries/finalizers
  - mcpservers/finalizers
  - mcptelemetryconfigs/finalizers
  - mcptoolconfigs/finalizers
  verbs:
  - update
- apiGroups:
  - toolhive.stacklok.dev
  resources:
  - embeddingservers/status
  - mcpexternalauthconfigs/status
  - mcpgroups/status
  - mcpoidcconfigs/status
  - mcpregistries/status
  - mcpremoteproxies/status
  - mcpservers/status
  - mcptelemetryconfigs/status
  - mcptoolconfigs/status
  - virtualmcpservers/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - toolhive.stacklok.dev
  resources:
  - mcptelemetryconfigs
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - toolhive.stacklok.dev
  resources:
  - virtualmcpcompositetooldefinitions
  verbs:
  - get
  - list
  - watch
