# Test scenario for issue #4996:
#   - "echo-mcp" pod runs an MCP-shaped streamable-http endpoint that records
#     every header it receives.
#   - MCPServerEntry "github-copilot-fake" points at it with three headerForward
#     entries: two plaintext, one secret-backed (referencing test-secret/token).
#   - VirtualMCPServer "vmcp-headerfwd" runs in inline mode against a single-entry
#     group and is what we'll send a tool list/call against.
#
# After deployment we'll make a streamable-http request through vMCP and assert
# the echo server's recorded headers contain X-MCP-Toolsets, X-Trace-Id, and
# X-Api-Key=secret-from-k8s-secret.
---
apiVersion: v1
kind: Namespace
metadata:
  name: hf-test
---
apiVersion: v1
kind: Secret
metadata:
  name: test-secret
  namespace: hf-test
type: Opaque
stringData:
  token: secret-from-k8s-secret
---
# Minimal MCP server that records every incoming Authorization-and-other
# header and exposes a /headers endpoint to inspect them. We use a python
# inline script via a configmap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-mcp-script
  namespace: hf-test
data:
  server.py: |
    import json, threading
    from http.server import BaseHTTPRequestHandler, HTTPServer

    captured_headers = []
    captured_lock = threading.Lock()

    class H(BaseHTTPRequestHandler):
        def _log_headers(self):
            with captured_lock:
                captured_headers.append({k: v for k, v in self.headers.items()})

        def do_GET(self):
            if self.path == "/headers":
                with captured_lock:
                    body = json.dumps(captured_headers).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return
            self._log_headers()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            self.wfile.write(b'{"jsonrpc":"2.0","id":0,"result":{}}')

        def do_POST(self):
            self._log_headers()
            length = int(self.headers.get("Content-Length", "0"))
            _ = self.rfile.read(length)
            # Minimal MCP initialize response so the streamable client doesn't error.
            body = b'{"jsonrpc":"2.0","id":1,"result":{"protocolVersion":"2025-03-26","capabilities":{"tools":{}},"serverInfo":{"name":"echo","version":"0"}}}'
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Mcp-Session-Id", "fake-session-1")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, *_):
            pass

    HTTPServer(("0.0.0.0", 8080), H).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-mcp
  namespace: hf-test
spec:
  replicas: 1
  selector:
    matchLabels: {app: echo-mcp}
  template:
    metadata:
      labels: {app: echo-mcp}
    spec:
      containers:
        - name: echo
          image: python:3.13-slim
          command: ["python3", "/scripts/server.py"]
          ports: [{containerPort: 8080}]
          volumeMounts:
            - {name: script, mountPath: /scripts}
      volumes:
        - {name: script, configMap: {name: echo-mcp-script}}
---
apiVersion: v1
kind: Service
metadata:
  name: echo-mcp
  namespace: hf-test
spec:
  selector: {app: echo-mcp}
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPGroup
metadata:
  name: hf-group
  namespace: hf-test
spec:
  description: header-forward integration test group
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServerEntry
metadata:
  name: github-copilot-fake
  namespace: hf-test
spec:
  remoteUrl: http://echo-mcp.hf-test.svc.cluster.local/
  transport: streamable-http
  groupRef:
    name: hf-group
  headerForward:
    addPlaintextHeaders:
      X-MCP-Toolsets: "projects,issues,pull_requests"
      X-Trace-Id: "kind-test"
    addHeadersFromSecret:
      - headerName: X-Api-Key
        valueSecretRef:
          name: test-secret
          key: token
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: vmcp-headerfwd
  namespace: hf-test
spec:
  groupRef:
    name: hf-group
  incomingAuth:
    type: anonymous
  outgoingAuth:
    source: inline
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
