# Script middleware demo — 8 dummy MCP servers + VirtualMCPServer
# Adapted from infra/flux/apps/anthropic-dogfood/mcp-resources.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: script-demo
---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPGroup
metadata:
  name: demo-group
  namespace: script-demo
spec:
  description: Demo MCP servers for script middleware prototype
---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: slack
  namespace: script-demo
spec:
  image: ghcr.io/stackloklabs/dummy-mcp:0.1.3
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 8100
  groupRef: demo-group
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          env:
            - name: TOOLS_CONFIG
              value: '{"tools":[{"name":"slack_list_channels","description":"List Slack channels in the workspace","return_value":"#general — Company-wide announcements (1,247 members)\n#engineering — Engineering discussion (342 members)\n#incidents — Active incident coordination (198 members)\n#random — Water cooler (1,102 members)"},{"name":"slack_read_messages","description":"Read recent messages from a channel","input_schema":{"channel":{"type":"string","description":"Channel name or ID"}},"return_value":"[10:32 AM] alice: Deployed v2.4.1 to staging, running smoke tests now\n[10:45 AM] bob: Smoke tests passed, promoting to prod\n[11:02 AM] carol: Prod deploy complete, monitoring dashboards look clean\n[11:15 AM] alice: Seeing elevated p99 on web-app after deploy, investigating\n[11:18 AM] bob: Confirmed — /checkout endpoint latency spiked, rolling back"},{"name":"slack_find_people","description":"Search for people in the workspace","input_schema":{"name":{"type":"string","description":"Person name or username"}},"return_value":"Alice Chen — Senior Engineer, Platform (alice@company.com)\nAlice Wong — Product Manager (awong@company.com)"},{"name":"slack_list_teams","description":"List Slack user groups and teams","return_value":"@engineering — Engineering team (45 members)\n@platform — Platform team (12 members)\n@oncall-primary — Current primary oncall (1 member)\n@product — Product team (18 members)"}]}'
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: jira
  namespace: script-demo
spec:
  image: ghcr.io/stackloklabs/dummy-mcp:0.1.3
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 8100
  groupRef: demo-group
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          env:
            - name: TOOLS_CONFIG
              value: '{"tools":[{"name":"jira_list_projects","description":"List Jira projects and boards","return_value":"ID: ENG | Name: Engineering\nID: PROD | Name: Product\nID: INFRA | Name: Infrastructure\nID: SEC | Name: Security"},{"name":"jira_search_issues","description":"Search issues by project, status, or assignee","input_schema":{"query":{"type":"string","description":"Search query or JQL expression"},"project":{"type":"string","description":"Project key to filter by"}},"return_value":"ENG-142: Upgrade auth middleware [In Progress] @alice — priority: High\nENG-157: Fix rate limiter edge case [Open] @bob — priority: Critical\nENG-163: Add retry logic to webhook handler [In Review] @carol — priority: Medium\nINFRA-89: web-app p99 latency regression [Open] @alice — priority: Critical"},{"name":"jira_create_issue","description":"Create a new Jira issue with summary and description","input_schema":{"project":{"type":"string","description":"Project key (e.g. ENG)"},"summary":{"type":"string","description":"Issue summary"},"description":{"type":"string","description":"Detailed description"}},"return_value":"Created ENG-201: Issue created successfully"},{"name":"jira_find_assignee","description":"Find a team member to assign an issue to","input_schema":{"name":{"type":"string","description":"Person name or username"}},"return_value":"Alice Chen (alice@company.com) — Engineering, 3 active issues\nBob Martinez (bob@company.com) — Engineering, 5 active issues\nCarol Park (carol@company.com) — Platform, 2 active issues"}]}'
