name: Helm Charts

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and Test Helm Charts
    runs-on: ubuntu-8cores-32gb
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: true

      - name: Set up ko
        uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.20.2 # helm

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run helm-docs
        run: task helm-docs

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: helm-docs generated changes that are not committed"
            git diff
            exit 1
          fi

      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml

      - name: Run helm-unittest
        # helm-unittest renders the charts and asserts on the resulting
        # Kubernetes manifests, catching template regressions that `ct lint`
        # and `ct install` do not — `helm install` can succeed even when the
        # rendered output is subtly wrong. The plugin version is pinned in
        # the Taskfile's `helm-unittest` task.
        run: task helm-unittest

      - name: Create KIND cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Build and load image into KIND
        run: |
          # Build to local Docker daemon, then load into KIND
          KO_DOCKER_REPO=ko.local ko build ./cmd/thv-operator \
            --base-import-paths \
            --tags=ci-test \
            --platform=linux/amd64

          KO_DOCKER_REPO=ko.local ko build ./cmd/thv-proxyrunner \
            --base-import-paths \
            --tags=ci-test \
            --platform=linux/amd64

          KO_DOCKER_REPO=ko.local ko build ./cmd/vmcp \
            --base-import-paths \
            --tags=ci-test \
            --platform=linux/amd64

          # Load the image into the KIND cluster
          kind load docker-image ko.local/thv-operator:ci-test --name chart-testing
          kind load docker-image ko.local/thv-proxyrunner:ci-test --name chart-testing
          kind load docker-image ko.local/vmcp:ci-test --name chart-testing

      - name: Run chart-testing (install)
        run: ct install --config ct.yaml
