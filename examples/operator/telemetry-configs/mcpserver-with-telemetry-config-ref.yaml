# MCPServer that references a shared MCPTelemetryConfig.
#
# Instead of defining telemetry inline (deprecated), this MCPServer uses
# spec.telemetryConfigRef to point to a shared MCPTelemetryConfig in the
# same namespace. The serviceName field provides a unique OTel service name
# for this server's traces and metrics.
#
# The referenced MCPTelemetryConfig ("basic-telemetry") must exist in
# toolhive-system before this MCPServer is created.
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: fetch
  namespace: toolhive-system
spec:
  image: ghcr.io/stackloklabs/gofetch/server
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 8080
  resources:
    limits:
      cpu: "100m"
      memory: "128Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"
  telemetryConfigRef:
    name: basic-telemetry
    serviceName: mcp-fetch-server
