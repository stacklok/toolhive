apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: vmcp-crd
spec:
  description: Test VirtualMCPServer CRD creation
  steps:
  - name: create-mcpgroup
    try:
    - apply:
        resource:
          apiVersion: toolhive.stacklok.dev/v1alpha1
          kind: MCPGroup
          metadata:
            name: test-group
          spec:
            description: "Test group for VirtualMCPServer"

  - name: create-mcpoidcconfig
    try:
    - apply:
        resource:
          apiVersion: toolhive.stacklok.dev/v1alpha1
          kind: MCPOIDCConfig
          metadata:
            name: test-vmcp-oidc
          spec:
            type: inline
            inline:
              issuer: https://auth.example.com

  - name: create-virtualmcpserver
    try:
    - apply:
        resource:
          apiVersion: toolhive.stacklok.dev/v1alpha1
          kind: VirtualMCPServer
          metadata:
            name: test-vmcp
          spec:
            groupRef:
              name: test-group
            config:
              aggregation:
                conflictResolution: prefix
            incomingAuth:
              type: oidc
              oidcConfigRef:
                name: test-vmcp-oidc
                audience: virtual-mcp
            outgoingAuth:
              source: discovered
    - assert:
        resource:
          apiVersion: toolhive.stacklok.dev/v1alpha1
          kind: VirtualMCPServer
          metadata:
            name: test-vmcp
